<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shiawassee Ranch Digital Log</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#f5f7f4; --card:#fff; --line:#d9e0d7; --text:#1f2a20; --muted:#637161; --accent:#2f7b3e; --danger:#b73030; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text); background:var(--bg); }
    .container { max-width:1000px; margin:0 auto; padding:14px; display:grid; gap:10px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .grid { display:grid; gap:10px; }
    .grid2 { display:grid; gap:10px; grid-template-columns:1fr; }
    .grid3 { display:grid; gap:10px; grid-template-columns:1fr; }
    @media (min-width:760px){ .grid2{grid-template-columns:1fr 1fr;} .grid3{grid-template-columns:repeat(3,1fr);} }
    input, select, textarea, button { font:inherit; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; background:#fff; }
    textarea { min-height:110px; resize:vertical; }
    button { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:#fff; cursor:pointer; }
    .primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .danger { background:var(--danger); color:#fff; border-color:var(--danger); }
    .split { display:flex; flex-wrap:wrap; gap:8px; }
    .split > * { flex:1; min-width:130px; }
    .muted { color:var(--muted); font-size:.9rem; }
    .error { color:var(--danger); }
    .ok { color:var(--accent); }
    .hidden { display:none !important; }
    .entry { border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:10px; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; color:var(--muted); font-size:.85rem; margin-bottom:8px; }
    .chip { display:inline-block; border:1px solid var(--line); border-radius:999px; padding:3px 8px; margin:2px 4px 2px 0; font-size:.8rem; }
    .top { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card">
      <h1 style="margin:0">Shiawassee Ranch Digital Log</h1>
      <div class="muted">Open ranch log: no login required.</div>
    </section>

    <section class="card grid">
      <h2 id="formTitle" style="margin:0; font-size:1.05rem;">New Entry</h2>
      <div class="grid3">
        <label>Your Name<input id="author" placeholder="Enter your name" /></label>
        <label>Date<input id="date" type="date" required /></label>
        <label>Category<select id="category"></select></label>
      </div>
      <label>Title<input id="title" placeholder="Short summary" /></label>
      <label>Description<textarea id="description" placeholder="Detailed notes"></textarea></label>
      <div class="grid2">
        <label>Tags (comma separated)<input id="tags" placeholder="tractor, north field" /></label>
        <label>Photo URLs (comma separated, optional)<input id="photoUrls" placeholder="https://..." /></label>
      </div>
      <div class="split">
        <button id="saveBtn" class="primary">Save</button>
        <button id="cancelBtn" class="hidden">Cancel Edit</button>
        <button id="deleteBtn" class="danger hidden">Delete</button>
      </div>
      <div id="saveMsg" class="muted"></div>
    </section>

    <section class="card grid">
      <div class="grid3">
        <label>Keyword<input id="fKeyword" placeholder="title or description" /></label>
        <label>Category<select id="fCategory"><option value="">All</option></select></label>
        <label>Author<input id="fAuthor" placeholder="author" /></label>
      </div>
      <div class="grid3">
        <label>From<input id="fFrom" type="date" /></label>
        <label>To<input id="fTo" type="date" /></label>
        <label>Tag<input id="fTags" placeholder="tag" /></label>
      </div>
      <div class="split">
        <button id="applyFilters" class="primary">Apply Filters</button>
        <button id="clearFilters">Clear</button>
      </div>
    </section>

    <section class="card">
      <div class="top">
        <h2 style="margin:0; font-size:1.05rem;">Log Feed</h2>
        <span id="countLabel" class="muted">0 entries</span>
      </div>
      <div id="feed"></div>
      <button id="loadMoreBtn" class="hidden" style="margin-top:10px;">Load more</button>
    </section>
  </div>

<script>
const SUPABASE_URL = "https://gpbusqwvjjhpwitoovkd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYnVzcXd2ampocHdpdG9vdmtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjQwNzgsImV4cCI6MjA4NzcwMDA3OH0.DyZZRZQ3X3onQh0Dxkcb1AdRq9Tcxf1XTUhR6nf3rQ8";
const PAGE_SIZE = 20;
const CATEGORIES = ["Property Maintenance","Equipment","Wildlife Observation","Hunting","Improvements","Guests","Weather","General Notes"];

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { entries: [], page: 0, hasMore: false, editing: null };
const $ = (id) => document.getElementById(id);

function today() { return new Date().toISOString().slice(0,10); }
function esc(s) { return String(s || "").replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function setMsg(text, cls="muted") { const el=$("saveMsg"); el.className=cls; el.textContent=text; }

function normalize(row) {
  return {
    id: row.id,
    date: row.event_at ? String(row.event_at).slice(0,10) : (row.created_at ? String(row.created_at).slice(0,10) : today()),
    category: row.entry_type || "General Notes",
    title: row.title || "",
    description: row.body || "",
    tags: row.tags || [],
    photos: row.photo_urls || [],
    author: row.author || "Unknown",
    created_at: row.created_at || row.event_at || new Date().toISOString()
  };
}

function toPayload() {
  const date = $("date").value || today();
  return {
    title: $("title").value.trim(),
    body: $("description").value.trim(),
    tags: $("tags").value.split(",").map((x) => x.trim()).filter(Boolean),
    photo_urls: $("photoUrls").value.split(",").map((x) => x.trim()).filter(Boolean),
    author: $("author").value.trim() || "Unknown",
    entry_type: $("category").value,
    event_at: `${date}T12:00:00.000Z`,
    updated_at: new Date().toISOString()
  };
}

function matchesFilters(e) {
  const kw = $("fKeyword").value.trim().toLowerCase();
  const cat = $("fCategory").value;
  const author = $("fAuthor").value.trim().toLowerCase();
  const from = $("fFrom").value;
  const to = $("fTo").value;
  const tag = $("fTags").value.trim().toLowerCase();
  if (cat && e.category !== cat) return false;
  if (author && !e.author.toLowerCase().includes(author)) return false;
  if (from && e.date < from) return false;
  if (to && e.date > to) return false;
  if (tag && !(e.tags || []).some((t) => String(t).toLowerCase().includes(tag))) return false;
  if (kw && !`${e.title} ${e.description}`.toLowerCase().includes(kw)) return false;
  return true;
}

function renderFeed() {
  const feed = $("feed");
  feed.innerHTML = "";
  $("countLabel").textContent = `${state.entries.length} entries`;
  if (!state.entries.length) feed.innerHTML = `<div class="muted">No entries found.</div>`;

  for (const e of state.entries) {
    const row = document.createElement("article");
    row.className = "entry";
    const tags = (e.tags || []).map((t) => `<span class="chip">#${esc(t)}</span>`).join("");
    const photos = (e.photos || []).map((p) => `<a href="${esc(p)}" target="_blank" rel="noreferrer" class="chip">photo</a>`).join(" ");
    row.innerHTML = `
      <h3 style="margin:0 0 6px;">${esc(e.title)}</h3>
      <div class="meta"><span>${esc(e.date)}</span><span>${esc(e.category)}</span><span>${esc(e.author)}</span><span>${new Date(e.created_at).toLocaleString()}</span></div>
      <div>${esc(e.description)}</div>
      <div style="margin-top:6px;">${tags}</div>
      ${photos ? `<div style="margin-top:6px;">${photos}</div>` : ""}
      <div class="split" style="margin-top:8px;"><button data-edit="${e.id}">Edit</button><button data-delete="${e.id}" class="danger">Delete</button></div>
    `;
    feed.appendChild(row);
  }

  feed.querySelectorAll("button[data-edit]").forEach((b) => b.onclick = () => startEdit(b.dataset.edit));
  feed.querySelectorAll("button[data-delete]").forEach((b) => b.onclick = () => quickDelete(b.dataset.delete));
  $("loadMoreBtn").classList.toggle("hidden", !state.hasMore);
}

async function loadEntries() {
  const { data, error } = await sb.from("notes").select("*").order("event_at", { ascending:false }).order("created_at", { ascending:false }).limit(500);
  if (error) return setMsg(`Load failed: ${error.message}`, "error");
  const filtered = (data || []).map(normalize).filter(matchesFilters);
  const limit = (state.page + 1) * PAGE_SIZE;
  state.hasMore = filtered.length > limit;
  state.entries = filtered.slice(0, limit);
  renderFeed();
}

function resetForm() {
  state.editing = null;
  $("formTitle").textContent = "New Entry";
  ["title","description","tags","photoUrls"].forEach((id) => $(id).value = "");
  $("deleteBtn").classList.add("hidden");
  $("cancelBtn").classList.add("hidden");
  setMsg("");
}

function startEdit(id) {
  const e = state.entries.find((x) => x.id === id);
  if (!e) return;
  state.editing = e;
  $("formTitle").textContent = "Edit Entry";
  $("author").value = e.author;
  $("date").value = e.date;
  $("category").value = e.category;
  $("title").value = e.title;
  $("description").value = e.description;
  $("tags").value = (e.tags || []).join(", ");
  $("photoUrls").value = (e.photos || []).join(", ");
  $("deleteBtn").classList.remove("hidden");
  $("cancelBtn").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

async function quickDelete(id) {
  if (!confirm("Delete this entry?")) return;
  const { error } = await sb.from("notes").delete().eq("id", id);
  if (error) return setMsg(error.message, "error");
  if (state.editing?.id === id) resetForm();
  await loadEntries();
}

async function saveEntry() {
  const payload = toPayload();
  if (!payload.title || !payload.body || !payload.entry_type) return setMsg("Name, category, title, and description are required.", "error");
  setMsg("Saving...");
  let error;
  if (state.editing?.id) {
    ({ error } = await sb.from("notes").update(payload).eq("id", state.editing.id));
  } else {
    ({ error } = await sb.from("notes").insert(payload));
  }
  if (error) return setMsg(error.message, "error");
  setMsg("Saved.", "ok");
  resetForm();
  state.page = 0;
  await loadEntries();
}

function initCategoryOptions() {
  const opts = CATEGORIES.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
  $("category").innerHTML = opts;
  $("fCategory").innerHTML = `<option value="">All</option>${opts}`;
}

(function init() {
  initCategoryOptions();
  $("date").value = today();
  $("saveBtn").onclick = saveEntry;
  $("cancelBtn").onclick = resetForm;
  $("deleteBtn").onclick = () => state.editing?.id && quickDelete(state.editing.id);
  $("applyFilters").onclick = async () => { state.page = 0; await loadEntries(); };
  $("clearFilters").onclick = async () => { ["fKeyword","fCategory","fAuthor","fFrom","fTo","fTags"].forEach((id) => $(id).value = ""); state.page = 0; await loadEntries(); };
  $("loadMoreBtn").onclick = async () => { state.page += 1; await loadEntries(); };
  loadEntries();
})();
</script>
</body>
</html>
