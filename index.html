<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shiawassee Ranch Digital Log</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg:#f5f7f4; --card:#fff; --line:#d9e0d7; --text:#1f2a20; --muted:#637161; --accent:#2f7b3e; --danger:#b73030; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text); background:var(--bg); }
    .container { max-width:1000px; margin:0 auto; padding:14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; }
    .top { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    h1 { margin:0; font-size:1.2rem; }
    .muted { color:var(--muted); font-size:.9rem; }
    .row { display:grid; gap:10px; }
    .grid2 { display:grid; grid-template-columns:1fr; gap:10px; }
    .grid3 { display:grid; grid-template-columns:1fr; gap:10px; }
    @media (min-width:760px){ .grid2{grid-template-columns:1fr 1fr;} .grid3{grid-template-columns:repeat(3,1fr);} }
    input, select, textarea, button { font:inherit; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px; background:#fff; }
    textarea { min-height:110px; resize:vertical; }
    button { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:#fff; cursor:pointer; }
    .primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .danger { color:#fff; background:var(--danger); border-color:var(--danger); }
    .toolbar { display:grid; gap:10px; margin-top:12px; }
    .entry { margin-top:10px; }
    .entry h3 { margin:0 0 6px; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; font-size:.85rem; color:var(--muted); margin-bottom:8px; }
    .chip { display:inline-block; padding:4px 8px; border:1px solid var(--line); border-radius:999px; font-size:.8rem; margin:2px 4px 2px 0; }
    .photos { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .photos img { width:96px; height:80px; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
    .hidden { display:none !important; }
    .split { display:flex; flex-wrap:wrap; gap:8px; }
    .split > * { flex:1; min-width:130px; }
    #feed .entry { border:1px solid var(--line); border-radius:12px; padding:12px; background:#fff; }
    .ok { color:var(--accent); }
    .error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="container row">
    <section class="card row" id="authCard">
      <div>
        <h1>Shiawassee Ranch Digital Log</h1>
        <div class="muted">Field-first ranch log (mobile + desktop).</div>
      </div>
      <div class="grid2">
        <label>Email<input id="email" type="email" autocomplete="email" /></label>
        <label>Password<input id="password" type="password" autocomplete="current-password" /></label>
      </div>
      <div class="split">
        <button id="signInBtn" class="primary">Sign in</button>
        <button id="signUpBtn">Create account</button>
        <button id="signOutBtn" class="hidden">Sign out</button>
      </div>
      <div id="authMsg" class="muted"></div>
    </section>

    <section id="app" class="row hidden">
      <div class="card top">
        <div>
          <strong id="who"></strong>
          <div class="muted" id="roleLabel"></div>
        </div>
        <div class="split" style="min-width:250px;">
          <button id="newBtn" class="primary">+ New Entry</button>
          <button id="exportBtn">Export CSV</button>
        </div>
      </div>

      <section class="card row" id="entryCard">
        <h2 id="formTitle" style="margin:0; font-size:1.05rem;">New Entry</h2>
        <div class="grid3">
          <label>Date<input id="date" type="date" required /></label>
          <label>Category<select id="category"></select></label>
          <label>Title<input id="title" placeholder="Short summary" /></label>
        </div>
        <label>Description<textarea id="description" placeholder="Detailed notes"></textarea></label>
        <div class="grid2">
          <label>Tags (comma separated)<input id="tags" placeholder="tractor, north field" /></label>
          <label>Photos<input id="photos" type="file" accept="image/*" multiple /></label>
        </div>
        <div id="photoPreview" class="photos"></div>
        <div class="split">
          <button id="saveBtn" class="primary">Save</button>
          <button id="cancelBtn" class="hidden">Cancel Edit</button>
          <button id="deleteBtn" class="danger hidden">Delete</button>
        </div>
        <div id="saveMsg" class="muted"></div>
      </section>

      <section class="card row toolbar">
        <div class="grid3">
          <label>Keyword<input id="fKeyword" placeholder="title or description" /></label>
          <label>Category<select id="fCategory"><option value="">All</option></select></label>
          <label>Author<input id="fAuthor" placeholder="author" /></label>
        </div>
        <div class="grid3">
          <label>From<input id="fFrom" type="date" /></label>
          <label>To<input id="fTo" type="date" /></label>
          <label>Tags<input id="fTags" placeholder="tag contains" /></label>
        </div>
        <div class="split">
          <button id="applyFilters" class="primary">Apply Filters</button>
          <button id="clearFilters">Clear</button>
        </div>
      </section>

      <section class="card row">
        <div class="top">
          <h2 style="margin:0; font-size:1.05rem;">Log Feed</h2>
          <span class="muted" id="countLabel">0 entries</span>
        </div>
        <div id="feed"></div>
        <button id="loadMoreBtn" class="hidden">Load more</button>
      </section>

      <section class="card row" id="adminCategories">
        <h2 style="margin:0; font-size:1.05rem;">Admin: Manage Categories</h2>
        <div class="split">
          <input id="newCategory" placeholder="Add category" />
          <button id="addCategoryBtn" class="primary">Add</button>
        </div>
        <div id="categoryList" class="muted"></div>
      </section>
    </section>
  </div>

<script>
const SUPABASE_URL = "https://gpbusqwvjjhpwitoovkd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYnVzcXd2ampocHdpdG9vdmtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjQwNzgsImV4cCI6MjA4NzcwMDA3OH0.DyZZRZQ3X3onQh0Dxkcb1AdRq9Tcxf1XTUhR6nf3rQ8";
const PHOTO_BUCKET = "log-photos";
const PAGE_SIZE = 20;
const DEFAULT_CATEGORIES = ["Property Maintenance","Equipment","Wildlife Observation","Hunting","Improvements","Guests","Weather","General Notes"];

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state = { user: null, role: "contributor", categories: [...DEFAULT_CATEGORIES], categoriesEnabled: true, entries: [], page: 0, hasMore: false, editing: null, selectedFiles: [] };

const $ = (id) => document.getElementById(id);
const authMsg = $("authMsg");

function setMsg(el, text, cls = "muted") { el.className = cls; el.textContent = text; }
function today() { return new Date().toISOString().slice(0, 10); }
function esc(s) { return String(s || "").replace(/[&<>"']/g, (m) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function csv(v) { return `"${String(v ?? "").replaceAll('"','""')}"`; }

function renderCategoryOptions() {
  const opts = state.categories.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
  $("category").innerHTML = opts;
  $("fCategory").innerHTML = `<option value="">All</option>${opts}`;
}

function wireAuth() {
  $("signInBtn").onclick = async () => {
    setMsg(authMsg, "Signing in...");
    const { error } = await sb.auth.signInWithPassword({ email: $("email").value.trim(), password: $("password").value });
    setMsg(authMsg, error ? error.message : "Signed in.", error ? "error" : "ok");
  };
  $("signUpBtn").onclick = async () => {
    setMsg(authMsg, "Creating account...");
    const { error } = await sb.auth.signUp({ email: $("email").value.trim(), password: $("password").value });
    setMsg(authMsg, error ? error.message : "Account created. Check email if confirmation is enabled.", error ? "error" : "ok");
  };
  $("signOutBtn").onclick = async () => { await sb.auth.signOut(); };
}

async function deriveRole(user) {
  const metaRole = user?.app_metadata?.role || user?.user_metadata?.role;
  if (metaRole === "admin" || metaRole === "contributor") return metaRole;
  const { data, error } = await sb.from("profiles").select("role").eq("id", user.id).maybeSingle();
  if (error) return "contributor";
  return (data?.role === "admin") ? "admin" : "contributor";
}

async function loadCategories() {
  const { data, error } = await sb.from("categories").select("name").order("name");
  state.categoriesEnabled = !error;
  state.categories = (!error && data?.length) ? data.map((c) => c.name) : [...DEFAULT_CATEGORIES];
  renderCategoryOptions();
}

function resetForm() {
  state.editing = null;
  state.selectedFiles = [];
  $("formTitle").textContent = "New Entry";
  $("date").value = today();
  $("title").value = "";
  $("description").value = "";
  $("tags").value = "";
  $("photos").value = "";
  $("photoPreview").innerHTML = "";
  $("deleteBtn").classList.add("hidden");
  $("cancelBtn").classList.add("hidden");
  setMsg($("saveMsg"), "");
}

function showApp(user) {
  $("app").classList.toggle("hidden", !user);
  $("signOutBtn").classList.toggle("hidden", !user);
  if (!user) return;
  $("who").textContent = user.email;
  $("roleLabel").textContent = `Role: ${state.role}`;
  $("adminCategories").classList.toggle("hidden", state.role !== "admin");
}

async function uploadPhotos(files) {
  const urls = [];
  for (const file of files) {
    const ext = file.name.includes(".") ? file.name.split(".").pop() : "jpg";
    const path = `${state.user.id}/${Date.now()}-${crypto.randomUUID()}.${ext}`;
    const { error } = await sb.storage.from(PHOTO_BUCKET).upload(path, file, { upsert: false });
    if (error) throw error;
    const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(path);
    urls.push(data.publicUrl);
  }
  return urls;
}

async function saveEntry() {
  const payload = {
    date: $("date").value || today(),
    category: $("category").value,
    title: $("title").value.trim(),
    description: $("description").value.trim(),
    tags: $("tags").value.split(",").map((x) => x.trim()).filter(Boolean),
    author: state.user.email
  };
  if (!payload.date || !payload.category || !payload.title || !payload.description) {
    return setMsg($("saveMsg"), "Date, category, title, and description are required.", "error");
  }
  setMsg($("saveMsg"), "Saving...");

  try {
    const newUrls = state.selectedFiles.length ? await uploadPhotos(state.selectedFiles) : [];
    const photos = [...(state.editing?.photos || []), ...newUrls];
    let error;
    if (state.editing?.id) {
      ({ error } = await sb.from("logs").update({ ...payload, photos }).eq("id", state.editing.id));
    } else {
      ({ error } = await sb.from("logs").insert({ ...payload, photos }));
    }
    if (error) throw error;
    setMsg($("saveMsg"), "Saved successfully.", "ok");
    resetForm();
    state.page = 0;
    await loadEntries();
  } catch (e) {
    setMsg($("saveMsg"), e.message || "Save failed.", "error");
  }
}

async function deleteEntry() {
  if (!state.editing?.id) return;
  if (!confirm("Delete this entry?")) return;
  const { error } = await sb.from("logs").delete().eq("id", state.editing.id);
  setMsg($("saveMsg"), error ? error.message : "Deleted.", error ? "error" : "ok");
  if (!error) {
    resetForm();
    state.page = 0;
    await loadEntries();
  }
}

function canEdit(entry) {
  return state.role === "admin" || entry.author === state.user.email;
}

function renderFeed() {
  const feed = $("feed");
  feed.innerHTML = "";
  $("countLabel").textContent = `${state.entries.length} entries`;
  if (!state.entries.length) {
    feed.innerHTML = `<div class="muted">No entries found.</div>`;
  }
  for (const e of state.entries) {
    const tags = (e.tags || []).map((t) => `<span class="chip">#${esc(t)}</span>`).join("");
    const photos = (e.photos || []).map((p) => `<a href="${esc(p)}" target="_blank" rel="noreferrer"><img src="${esc(p)}" alt="entry photo" /></a>`).join("");
    const node = document.createElement("article");
    node.className = "entry";
    node.innerHTML = `
      <h3>${esc(e.title)}</h3>
      <div class="meta">
        <span>${esc(e.date)}</span><span>${esc(e.category)}</span><span>${esc(e.author || "")}</span><span>${new Date(e.created_at).toLocaleString()}</span>
      </div>
      <div>${esc(e.description)}</div>
      <div>${tags}</div>
      ${photos ? `<div class="photos">${photos}</div>` : ""}
      ${canEdit(e) ? `<div style="margin-top:8px"><button data-edit="${e.id}">Edit</button></div>` : ""}
    `;
    feed.appendChild(node);
  }
  feed.querySelectorAll("button[data-edit]").forEach((btn) => btn.onclick = () => beginEdit(btn.dataset.edit));
  $("loadMoreBtn").classList.toggle("hidden", !state.hasMore);
}

async function loadEntries(append = false) {
  const start = state.page * PAGE_SIZE;
  const end = start + PAGE_SIZE - 1;
  let query = sb.from("logs").select("*").order("date", { ascending:false }).order("created_at", { ascending:false }).range(start, end);

  const keyword = $("fKeyword").value.trim();
  const cat = $("fCategory").value;
  const author = $("fAuthor").value.trim();
  const from = $("fFrom").value;
  const to = $("fTo").value;
  const tag = $("fTags").value.trim();

  if (cat) query = query.eq("category", cat);
  if (author) query = query.ilike("author", `%${author}%`);
  if (from) query = query.gte("date", from);
  if (to) query = query.lte("date", to);
  if (tag) query = query.contains("tags", [tag]);
  if (keyword) {
    const safeKeyword = keyword.replaceAll(",", " ").replaceAll("%", "").trim();
    if (safeKeyword) query = query.or(`title.ilike.%${safeKeyword}%,description.ilike.%${safeKeyword}%`);
  }

  const { data, error } = await query;
  if (error) return setMsg($("saveMsg"), `Load failed: ${error.message}`, "error");
  state.hasMore = (data || []).length === PAGE_SIZE;
  state.entries = append ? [...state.entries, ...(data || [])] : (data || []);
  renderFeed();
}

function beginEdit(id) {
  const e = state.entries.find((x) => x.id === id);
  if (!e) return;
  state.editing = e;
  $("formTitle").textContent = "Edit Entry";
  $("date").value = e.date;
  $("category").value = e.category;
  $("title").value = e.title;
  $("description").value = e.description;
  $("tags").value = (e.tags || []).join(", ");
  $("photoPreview").innerHTML = (e.photos || []).map((p) => `<img src="${esc(p)}" alt="existing photo" />`).join("");
  $("deleteBtn").classList.remove("hidden");
  $("cancelBtn").classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function wireFilters() {
  $("applyFilters").onclick = async () => { state.page = 0; await loadEntries(false); };
  $("clearFilters").onclick = async () => {
    ["fKeyword","fCategory","fAuthor","fFrom","fTo","fTags"].forEach((id) => $(id).value = "");
    state.page = 0;
    await loadEntries(false);
  };
  $("loadMoreBtn").onclick = async () => { state.page += 1; await loadEntries(true); };
}

function wireForm() {
  $("newBtn").onclick = () => resetForm();
  $("saveBtn").onclick = saveEntry;
  $("deleteBtn").onclick = deleteEntry;
  $("cancelBtn").onclick = resetForm;
  $("photos").onchange = () => {
    state.selectedFiles = Array.from($("photos").files || []);
    $("photoPreview").innerHTML = state.selectedFiles.map((f) => `<img src="${URL.createObjectURL(f)}" alt="new photo" />`).join("");
  };
  $("exportBtn").onclick = () => {
    if (state.role !== "admin") return alert("Only admins can export logs.");
    const header = ["date","category","title","description","tags","author","created_at"];
    const rows = state.entries.map((e) => [e.date,e.category,e.title,e.description,(e.tags||[]).join("|"),e.author,e.created_at]);
    const data = [header, ...rows].map((r) => r.map(csv).join(",")).join("\n");
    const blob = new Blob([data], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `shiawassee-log-${today()}.csv`;
    a.click();
  };
}

async function addCategory() {
  const name = $("newCategory").value.trim();
  if (!name) return;
  if (!state.categoriesEnabled) {
    state.categories = Array.from(new Set([...state.categories, name]));
    $("newCategory").value = "";
    renderCategoryOptions();
    renderCategoryAdmin();
    return;
  }
  const { error } = await sb.from("categories").insert({ name });
  if (error) return setMsg($("categoryList"), error.message, "error");
  $("newCategory").value = "";
  await loadCategories();
  renderCategoryAdmin();
}

async function removeCategory(name) {
  if (!state.categoriesEnabled) {
    state.categories = state.categories.filter((c) => c !== name);
    renderCategoryOptions();
    renderCategoryAdmin();
    return;
  }
  const { error } = await sb.from("categories").delete().eq("name", name);
  if (error) return setMsg($("categoryList"), error.message, "error");
  await loadCategories();
  renderCategoryAdmin();
}

function renderCategoryAdmin() {
  const host = $("categoryList");
  if (state.role !== "admin") return;
  const mode = state.categoriesEnabled ? "Stored in Supabase categories table." : "Categories table not available; using local defaults for this session.";
  host.innerHTML = `<div style="margin-bottom:8px">${esc(mode)}</div>`;
  const frag = document.createDocumentFragment();
  state.categories.forEach((c) => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = `${c} `;
    const btn = document.createElement("button");
    btn.textContent = "x";
    btn.style.padding = "2px 6px";
    btn.onclick = () => removeCategory(c);
    chip.appendChild(btn);
    frag.appendChild(chip);
    frag.appendChild(document.createTextNode(" "));
  });
  host.appendChild(frag);
}

async function initSession(session) {
  state.user = session?.user || null;
  if (!state.user) return showApp(null);
  try {
    state.role = await deriveRole(state.user);
    showApp(state.user);
    await loadCategories();
    resetForm();
    renderCategoryAdmin();
    state.page = 0;
    await loadEntries(false);
  } catch (e) {
    setMsg($("authMsg"), `Initialization failed: ${e.message || e}`, "error");
  }
}

(async function init() {
  wireAuth();
  wireForm();
  wireFilters();
  $("addCategoryBtn").onclick = addCategory;
  $("date").value = today();

  const { data } = await sb.auth.getSession();
  await initSession(data.session);

  sb.auth.onAuthStateChange(async (_event, session) => {
    await initSession(session);
  });
})();
</script>
</body>
</html>
