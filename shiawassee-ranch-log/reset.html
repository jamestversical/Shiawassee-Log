<body>

<button id="save">Update Password</button>

<div id="msg"></div>

<script>

const sb=supabase.createClient(
"https://gpbusqwvjjhpwitoovkd.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwYnVzcXd2ampocHdpdG9vdmtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMjQwNzgsImV4cCI6MjA4NzcwMDA3OH0.DyZZRZQ3X3onQh0Dxkcb1AdRq9Tcxf1XTUhR6nf3rQ8"
)

document.getElementById("save").onclick=async()=>{

const password=document.getElementById("pw1").value

const {error}=await sb.auth.updateUser({password})

if(error) return msg(error.message)

msg("Password updated. Redirecting...")

setTimeout(()=>location.href="login.html",1500)

}

function msg(t){document.getElementById("msg").innerText=t}

</script>
